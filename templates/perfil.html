{% extends 'base.html' %} {% block content %}
<section id="perfil" class="active">
  <div class="logbook-section">
    <div class="section-header" style="padding: 0 0 2rem">
      <span class="section-tag">// USER_DATA_CORE</span>
      <h2 class="section-title">MEU PERFIL</h2>
      <div class="section-line"></div>
    </div>

    <div
      style="
        max-width: 600px;
        margin: 0 auto;
        background: rgba(10, 10, 20, 0.8);
        padding: 3rem;
        border: 1px solid var(--neon-purple);
        box-shadow: inset 0 0 20px rgba(160, 32, 240, 0.1);
      "
    >
      <div
        style="
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-bottom: 2rem;
          border-bottom: 1px solid rgba(85, 85, 119, 0.3);
          padding-bottom: 1rem;
        "
      >
        <div
          style="
            color: var(--cyan);
            font-family: &quot;Share Tech Mono&quot;;
            letter-spacing: 2px;
          "
        >
          // IDENTIFICAÇÃO NEURAL
        </div>
        <button
          onclick="window.location.href = '/'"
          style="
            background: transparent;
            border: 1px solid var(--neon-pink);
            color: var(--neon-pink);
            padding: 0.3rem 0.8rem;
            font-family: &quot;Share Tech Mono&quot;;
            cursor: pointer;
            transition: 0.3s;
          "
          onmouseover="
            this.style.background = 'var(--neon-pink)';
            this.style.color = '#000';
          "
          onmouseout="
            this.style.background = 'transparent';
            this.style.color = 'var(--neon-pink)';
          "
        >
          X FECHAR
        </button>
      </div>

      <div class="field-row" style="margin-bottom: 1rem">
        <div>
          <label
            style="
              font-family: &quot;Share Tech Mono&quot;;
              font-size: 0.6rem;
              color: var(--text-dim);
              display: block;
              margin-bottom: 0.5rem;
            "
            >// NOME COMPLETO</label
          >
          <input
            type="text"
            id="perfil-nome"
            class="field-input"
            style="
              width: 100%;
              border: 1px solid var(--border-glow);
              background: rgba(10, 10, 20, 0.8);
              color: var(--text-color);
              padding: 0.8rem;
            "
          />
        </div>
        <div>
          <label
            style="
              font-family: &quot;Share Tech Mono&quot;;
              font-size: 0.6rem;
              color: var(--text-dim);
              display: block;
              margin-bottom: 0.5rem;
            "
            >// DATA DE NASCIMENTO</label
          >
          <input
            type="date"
            id="perfil-data"
            class="field-input"
            style="
              width: 100%;
              border: 1px solid var(--border-glow);
              background: rgba(10, 10, 20, 0.8);
              color: var(--text-color);
              padding: 0.8rem;
              font-family: &quot;Share Tech Mono&quot;;
            "
          />
        </div>
      </div>

      <div class="field-row" style="margin-bottom: 1rem">
        <div>
          <label
            style="
              font-family: &quot;Share Tech Mono&quot;;
              font-size: 0.6rem;
              color: var(--text-dim);
              display: block;
              margin-bottom: 0.5rem;
            "
            >// CPF</label
          >
          <input
            type="text"
            id="perfil-cpf"
            class="field-input"
            style="
              width: 100%;
              border: 1px solid var(--border-glow);
              background: rgba(10, 10, 20, 0.8);
              color: var(--text-color);
              padding: 0.8rem;
            "
          />
        </div>
        <div>
          <label
            style="
              font-family: &quot;Share Tech Mono&quot;;
              font-size: 0.6rem;
              color: var(--text-dim);
              display: block;
              margin-bottom: 0.5rem;
            "
            >// EMAIL</label
          >
          <input
            type="email"
            id="perfil-email"
            class="field-input"
            style="
              width: 100%;
              border: 1px solid var(--border-glow);
              background: rgba(10, 10, 20, 0.8);
              color: var(--text-color);
              padding: 0.8rem;
            "
          />
        </div>
      </div>

      <div class="field-row" style="margin-bottom: 1rem">
        <div>
          <label
            style="
              font-family: &quot;Share Tech Mono&quot;;
              font-size: 0.6rem;
              color: var(--text-dim);
              display: block;
              margin-bottom: 0.5rem;
            "
            >// GÊNERO</label
          >
          <select
            id="perfil-genero"
            class="field-input"
            style="
              width: 100%;
              border: 1px solid var(--border-glow);
              background: rgba(10, 10, 20, 0.8);
              color: var(--text-color);
              padding: 0.8rem;
              font-family: &quot;Share Tech Mono&quot;;
            "
          >
            <option value="M">Homem</option>
            <option value="F">Mulher</option>
            <option value="N">Prefiro não informar</option>
          </select>
        </div>
        <div style="display: flex; gap: 1rem">
          <div style="flex: 1">
            <label
              style="
                font-family: &quot;Share Tech Mono&quot;;
                font-size: 0.6rem;
                color: var(--text-dim);
                display: block;
                margin-bottom: 0.5rem;
              "
              >// PESO (kg)</label
            >
            <input
              type="number"
              step="0.1"
              id="perfil-peso"
              class="field-input"
              style="
                width: 100%;
                border: 1px solid var(--border-glow);
                background: rgba(10, 10, 20, 0.8);
                color: var(--text-color);
                padding: 0.8rem;
              "
            />
          </div>
          <div style="flex: 1">
            <label
              style="
                font-family: &quot;Share Tech Mono&quot;;
                font-size: 0.6rem;
                color: var(--text-dim);
                display: block;
                margin-bottom: 0.5rem;
              "
              >// ALTURA (cm)</label
            >
            <input
              type="number"
              id="perfil-altura"
              class="field-input"
              style="
                width: 100%;
                border: 1px solid var(--border-glow);
                background: rgba(10, 10, 20, 0.8);
                color: var(--text-color);
                padding: 0.8rem;
              "
            />
          </div>
        </div>
      </div>

      <div style="margin-bottom: 3rem">
        <label
          style="
            font-family: &quot;Share Tech Mono&quot;;
            font-size: 0.6rem;
            color: var(--text-dim);
            display: block;
            margin-bottom: 0.5rem;
          "
          >// OBJETIVO DO PROTOCOLO (Ex: Hipertrofia, Força)</label
        >
        <input
          type="text"
          id="perfil-objetivo"
          class="field-input"
          style="
            width: 100%;
            border: 1px solid var(--border-glow);
            background: rgba(10, 10, 20, 0.8);
            color: var(--text-color);
            padding: 0.8rem;
          "
        />
      </div>

      <div
        style="
          background: rgba(255, 0, 85, 0.05);
          border: 1px dashed var(--neon-pink);
          padding: 1.5rem;
          margin-bottom: 2rem;
        "
      >
        <label
          style="
            font-family: &quot;Share Tech Mono&quot;;
            font-size: 0.7rem;
            color: var(--neon-pink);
            display: block;
            margin-bottom: 0.5rem;
          "
          >// AUTORIZAÇÃO NECESSÁRIA</label
        >
        <p
          style="font-size: 0.7rem; color: var(--text-dim); margin-bottom: 1rem"
        >
          Para aplicar as alterações em seus dados, insira sua senha atual:
        </p>
        <input
          type="password"
          id="perfil-senha-confirma"
          placeholder="Digite sua senha..."
          class="field-input"
          style="
            width: 100%;
            border: 1px solid var(--neon-pink);
            background: rgba(10, 10, 20, 0.8);
            color: var(--text-color);
            padding: 0.8rem;
          "
        />
      </div>

      <button
        onclick="salvarPerfil()"
        class="btn-neon"
        style="
          width: 100%;
          padding: 1rem;
          cursor: pointer;
          text-transform: uppercase;
        "
      >
        SALVAR ALTERAÇÕES
      </button>

      <div
        style="
          border-top: 1px solid rgba(255, 34, 68, 0.3);
          padding-top: 2rem;
          text-align: center;
          margin-top: 2rem;
        "
      >
        <p
          style="
            font-family: &quot;Share Tech Mono&quot;;
            font-size: 0.6rem;
            color: var(--neon-red);
            margin-bottom: 1rem;
          "
        >
          ⚠️ AÇÃO IRREVERSÍVEL: APAGAR REGISTRO NEURAL ⚠️
        </p>
        <button
          onclick="deletarConta()"
          style="
            padding: 0.8rem 2rem;
            background: transparent;
            border: 1px dashed var(--neon-red);
            color: var(--neon-red);
            font-family: &quot;Michroma&quot;;
            font-size: 0.6rem;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: 0.3s;
          "
        >
          EXCLUIR CONTA DEFINITIVAMENTE
        </button>
      </div>
    </div>
  </div>
</section>
{% endblock %}
